<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb"/>
      <stop offset="100%" style="stop-color:#e8e0d6"/>
    </linearGradient>
    <linearGradient id="counter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="100%" style="stop-color:#6d5a3d"/>
    </linearGradient>
    <linearGradient id="counterTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0896a"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
    <linearGradient id="glassCase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="glowWarm" cx="50%" cy="30%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background wall -->
  <rect width="800" height="600" fill="url(#bgWall)"/>

  <!-- Warm ambient glow -->
  <rect width="800" height="600" fill="url(#glowWarm)"/>

  <!-- Wainscoting / wall panels -->
  <g stroke="#d4c9b8" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
    <line x1="500" y1="0" x2="500" y2="240"/>
    <line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="700" y1="0" x2="700" y2="240"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="420" width="800" height="180" fill="#c4a97d" opacity="0.3"/>

  <!-- Display counter -->
  <rect x="100" y="300" width="600" height="130" rx="3" fill="url(#counter)" filter="url(#shadow)"/>
  <rect x="100" y="290" width="600" height="20" rx="3" fill="url(#counterTop)"/>

  <!-- Glass display case on counter -->
  <rect x="150" y="230" width="200" height="70" rx="2" fill="url(#glassCase)" stroke="#d4c9b8" stroke-width="0.5"/>
  <rect x="450" y="230" width="200" height="70" rx="2" fill="url(#glassCase)" stroke="#d4c9b8" stroke-width="0.5"/>

  <!-- Ring in left case -->
  <g transform="translate(250, 260)">
    <ellipse cx="0" cy="8" rx="15" ry="5" fill="none" stroke="url(#goldAccent)" stroke-width="2"/>
    <line x1="-8" y1="3" x2="-5" y2="-8" stroke="url(#goldAccent)" stroke-width="1.5"/>
    <line x1="8" y1="3" x2="5" y2="-8" stroke="url(#goldAccent)" stroke-width="1.5"/>
    <polygon points="0,-18 -6,-6 0,4 6,-6" fill="#fff" opacity="0.9"/>
    <polygon points="0,-14 -4,-6 0,2 4,-6" fill="#fff"/>
  </g>

  <!-- Diamond accent in right case -->
  <g transform="translate(550, 260)">
    <polygon points="0,-12 -5,-4 0,4 5,-4" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Necklace hanging on wall - left -->
  <g transform="translate(400, 60)" opacity="0.15">
    <path d="M0,0 Q-40,30 -35,60 Q-30,80 -20,85" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M0,0 Q40,30 35,60 Q30,80 20,85" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="0" cy="-3" r="4" fill="#fbbf24" opacity="0.5"/>
  </g>

  <!-- Warm ambient light spots -->
  <g opacity="0.06">
    <circle cx="200" cy="50" r="80" fill="#fbbf24"/>
    <circle cx="600" cy="50" r="80" fill="#fbbf24"/>
  </g>

  <!-- Decorative gold line accent -->
  <g opacity="0.2">
    <line x1="0" y1="240" x2="800" y2="240" stroke="url(#goldAccent)" stroke-width="0.5"/>
  </g>

  <!-- Subtle sparkle -->
  <g filter="url(#softGlow)" opacity="0.3">
    <circle cx="180" cy="120" r="1.5" fill="#fff"/>
    <circle cx="620" cy="100" r="1" fill="#fff"/>
    <circle cx="400" cy="180" r="1" fill="#fff"/>
  </g>
</svg>
