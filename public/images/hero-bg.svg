<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="30%" style="stop-color:#fbbf24"/>
      <stop offset="60%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg1)"/>

  <!-- Subtle radial glow -->
  <rect width="1440" height="900" fill="url(#glow)"/>

  <!-- Decorative diamond shapes -->
  <g opacity="0.03">
    <polygon points="720,50 770,150 720,250 670,150" fill="#fbbf24"/>
    <polygon points="300,100 330,160 300,220 270,160" fill="#fbbf24"/>
    <polygon points="1140,120 1165,170 1140,220 1115,170" fill="#fbbf24"/>
  </g>

  <!-- Subtle geometric lines -->
  <g stroke="#fbbf24" stroke-opacity="0.04" fill="none" stroke-width="1">
    <line x1="0" y1="150" x2="1440" y2="150"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="450" x2="1440" y2="450"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="360" y1="0" x2="360" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/>
  </g>

  <!-- Large decorative ring - left -->
  <g transform="translate(120, 450)" opacity="0.08">
    <circle cx="0" cy="0" r="200" fill="none" stroke="url(#goldLight)" stroke-width="2"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#goldLight)" stroke-width="1"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#goldLight)" stroke-width="0.5"/>
  </g>

  <!-- Large decorative ring - right -->
  <g transform="translate(1320, 450)" opacity="0.08">
    <circle cx="0" cy="0" r="200" fill="none" stroke="url(#goldLight)" stroke-width="2"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#goldLight)" stroke-width="1"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#goldLight)" stroke-width="0.5"/>
  </g>

  <!-- Center Jewelry Display -->
  <g transform="translate(720, 420)">
    <!-- Diamond solitaire ring -->
    <g filter="url(#softGlow)">
      <!-- Band -->
      <ellipse cx="0" cy="80" rx="80" ry="25" fill="none" stroke="url(#ringGrad)" stroke-width="6"/>
      <line x1="-40" y1="62" x2="-20" y2="20" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>
      <line x1="40" y1="62" x2="20" y2="20" stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"/>

      <!-- Prongs -->
      <line x1="-12" y1="18" x2="-10" y2="-10" stroke="#fbbf24" stroke-width="2.5"/>
      <line x1="12" y1="18" x2="10" y2="-10" stroke="#fbbf24" stroke-width="2.5"/>
      <line x1="0" y1="18" x2="0" y2="-12" stroke="#fbbf24" stroke-width="2.5"/>

      <!-- Diamond (cushion cut) -->
      <polygon points="0,-45 -18,-10 0,20 18,-10" fill="url(#goldLight)" opacity="0.6"/>
      <polygon points="0,-45 -14,-10 0,12 14,-10" fill="#ffffff" opacity="0.8"/>
      <polygon points="0,-35 -8,-10 0,8 8,-10" fill="#ffffff" opacity="0.9"/>
      <polygon points="0,-25 -4,-10 0,2 4,-10" fill="#ffffff"/>
    </g>

    <!-- Side diamond accents -->
    <g filter="url(#sparkle)">
      <polygon points="-120,-30 -115,-20 -120,-10 -125,-20" fill="#fff" opacity="0.7"/>
      <polygon points="120,-30 125,-20 120,-10 115,-20" fill="#fff" opacity="0.7"/>
    </g>
  </g>

  <!-- Floating sparkles / diamond dust -->
  <g filter="url(#sparkle)">
    <circle cx="550" cy="250" r="2" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="200" r="1.5" fill="#fff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="180" r="1.5" fill="#fff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="280" r="2" fill="#fff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="350" r="1" fill="#fff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="300" r="1.5" fill="#fff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="150" r="1" fill="#fff" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="500" r="1.5" fill="#fff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="940" cy="480" r="1" fill="#fff" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom decorative gold line -->
  <g opacity="0.15">
    <line x1="200" y1="750" x2="1240" y2="750" stroke="url(#gold)" stroke-width="1"/>
    <line x1="300" y1="760" x2="1140" y2="760" stroke="url(#gold)" stroke-width="0.5"/>
  </g>
</svg>
